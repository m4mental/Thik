name: Build Personal LSPosed Module

on:
  workflow_dispatch: # मैन्युअल रूप से बिल्ड चलाने के लिए
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build LSPosed APK
    runs-on: ubuntu-latest

    steps:
      # 1. रिपोजिटरी चेकआउट करना (सबमॉड्यूल्स के साथ)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. बिल्ड के समय आटोमैटिक थीम ओवरराइड और यूट्यूब-ओनली मॉडिफिकेशन (पायथन स्क्रिप्ट)
      - name: Auto Patch Morphe Theme & YouTube-Only Optimization
        run: |
          cat << 'EOF' > patch.py
          import os

          # क) Morphe Patches के अंदर थीम पैच को AMOLED पर फोर्स करना
          theme_filepath = "morphe-patches/patches/src/main/kotlin/app/morphe/patches/youtube/layout/theme/ThemePatch.kt"
          if os.path.exists(theme_filepath):
              with open(theme_filepath, "r") as file:
                  content = file.read()
              content = content.replace("darkThemeBackgroundColorOption.value!!", "\"#000000\"")
              content = content.replace("val isMaterialYouDark = darkThemeBackgroundColorOption.value!!.startsWith(\"@android:color/system_\")", "val isMaterialYouDark = false")
              content = content.replace("val isMaterialYouDark = \"#000000\".startsWith(\"@android:color/system_\")", "val isMaterialYouDark = false")
              content = content.replace("lightColorReplacement = { lightThemeBackgroundColor!! },", "lightColorReplacement = { lightThemeBackgroundColor!! },\n                darkColorReplacement = { \"#000000\" },")
              with open(theme_filepath, "w") as file:
                  file.write(content)
              print("ThemePatch.kt successfully patched!")
          else:
              print("ThemePatch.kt not found!")

          # ख) MainHook.kt में बदलाव करना (यूट्यूब के प्रिफरेंस में #000000 को फोर्स-राइट करना)
          main_hook_path = "app/src/main/java/io/github/nexalloy/MainHook.kt"
          if os.path.exists(main_hook_path):
              new_main_hook = """package io.github.nexalloy

import android.app.Application
import android.content.Context
import android.util.Log
import app.morphe.extension.shared.ResourceType
import app.morphe.extension.shared.ResourceUtils
import app.morphe.extension.shared.Utils
import de.robv.android.xposed.IXposedHookLoadPackage
import de.robv.android.xposed.IXposedHookZygoteInit
import de.robv.android.xposed.IXposedHookZygoteInit.StartupParam
import de.robv.android.xposed.XC_MethodHook
import de.robv.android.xposed.XSharedPreferences
import de.robv.android.xposed.XposedBridge
import de.robv.android.xposed.XposedHelpers
import de.robv.android.xposed.callbacks.XC_LoadPackage.LoadPackageParam
import io.github.nexalloy.common.UpdateChecker
import io.github.nexalloy.morphe.ResourceFinder
import io.github.nexalloy.morphe.resourceMappings

class MainHook : IXposedHookLoadPackage, IXposedHookZygoteInit {
    lateinit var startupParam: StartupParam
    lateinit var lpparam: LoadPackageParam
    lateinit var app: Application
    var targetPackageName: String? = null

    fun shouldHook(packageName: String): Boolean {
        // केवल यूट्यूब को ही हुक होने दें (YouTube Only Filter)
        if (packageName != "com.google.android.youtube") return false
        if (!patchesByPackage.containsKey(packageName)) return false
        if (targetPackageName == null) targetPackageName = packageName
        return targetPackageName == packageName
    }

    override fun handleLoadPackage(lpparam: LoadPackageParam) {
        if (!lpparam.isFirstApplication) return
        if (!shouldHook(lpparam.packageName)) return
        this.lpparam = lpparam

        inContext(lpparam) { app ->
            this.app = app
            if (isReVancedPatched(lpparam)) {
                Utils.showToastLong("NexAlloy module does not work with patched app")
                return@inContext
            }

            resourceMappings = object : ResourceFinder {
                override operator fun get(type: String, name: String): Int {
                    val id = ResourceUtils.getIdentifier(ResourceType.fromValue(type), name)
                    if (id == 0) throw Exception("Could not find resource type: $type name: $name")
                    return id
                }
            }

            val patches = patchesByPackage[lpparam.packageName] ?: return@inContext
            PatchExecutor(app, lpparam).applyPatches(patches)
        }
    }

    private fun isReVancedPatched(lpparam: LoadPackageParam): Boolean {
        return runCatching {
            lpparam.classLoader.loadClass("app.morphe.extension.shared.Utils")
        }.isSuccess || runCatching {
            lpparam.classLoader.loadClass("app.morphe.extension.shared.utils.Utils")
        }.isSuccess || runCatching {
            lpparam.classLoader.loadClass("app.revanced.integrations.shared.Utils")
        }.isSuccess || runCatching {
            lpparam.classLoader.loadClass("app.revanced.integrations.shared.utils.Utils")
        }.isSuccess
    }

    override fun initZygote(startupParam: StartupParam) {
        this.startupParam = startupParam
        XposedInit = startupParam
    }
}

fun inContext(lpparam: LoadPackageParam, f: (Application) -> Unit) {
    val appClazz = XposedHelpers.findClass(lpparam.appInfo.className, lpparam.classLoader)
    XposedBridge.hookMethod(appClazz.getMethod("onCreate"), object : XC_MethodHook() {
        override fun beforeHookedMethod(param: MethodHookParam) {
            val app = param.thisObject as Application
            Utils.setContext(app)
            
            // यूट्यूब खुलने से ठीक पहले उसकी सभी प्रिफरेंस सेटिंग्स में प्योर ब्लैक (#000000) फोर्स-राइट करना
            val prefNames = arrayOf("prefs", "morphe_preferences", "app.morphe.preferences", "nexalloy_preferences", "${app.packageName}_preferences")
            for (prefName in prefNames) {
                try {
                    val p = app.getSharedPreferences(prefName, Context.MODE_PRIVATE)
                    p.edit()
                     .putString("darkThemeBackgroundColor", "#000000")
                     .putString("dark_theme_background_color", "#000000")
                     .putString("morphe_dark_theme_background_color", "#000000")
                     .putString("morphe_dark_theme_color", "#000000")
                     .putBoolean("amoled_theme", true)
                     .putBoolean("amoled", true)
                     .apply()
                } catch (e: Exception) {}
            }
            
            f(app)
            if (XposedInit.modulePath.startsWith("/data/app/")) {
                val prefs = XSharedPreferences(BuildConfig.APPLICATION_ID, "prefs")
                if (!prefs.file.canRead() || !prefs.getBoolean("disable_auto_check_update", false)) {
                    UpdateChecker().hookNewActivity()
                }
            }
        }
    })
}
"""
              with open(main_hook_path, "w") as file:
                  file.write(new_main_hook)
              print("MainHook.kt successfully patched!")
          else:
              print("MainHook.kt not found!")
          EOF
          python patch.py

      # 3. जावा सेटअप (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 4. Gradle को एग्जीक्यूट परमिशन देना
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Debug APK कंपाइल करना
      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug --stacktrace

      # 6. तैयार कस्टमाइज्ड APK को अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexAlloy-YouTube-Only-Debug
          path: app/build/outputs/apk/debug/*.apk
